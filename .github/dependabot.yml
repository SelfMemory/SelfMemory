version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    versioning-strategy: "increase-if-necessary"
    labels:
      - "dependencies"
      - "python"
      - "core"
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-python:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "pydantic"
        update-types: ["version-update:semver-major"]
      - dependency-name: "fastapi"
        update-types: ["version-update:semver-major"]
      - dependency-name: "qdrant-client"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "uv-lockfile"
      - "core"
    commit-message:
      prefix: "chore(deps-uv)"

  - package-ecosystem: "pip"
    directory: "/selfmemory-mcp"
    schedule:
      interval: "daily"
      time: "11:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    versioning-strategy: "increase-if-necessary"
    labels:
      - "dependencies"
      - "python"
      - "mcp"
    commit-message:
      prefix: "chore(deps-mcp)"
    groups:
      all-mcp:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "mcp"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "daily"
      time: "11:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "npm"
      - "docs"
    commit-message:
      prefix: "chore(deps-docs)"
    groups:
      all-docs:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "12:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "github/*"
          - "astral-sh/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "13:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(docker)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
